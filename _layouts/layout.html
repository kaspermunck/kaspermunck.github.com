<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="author" content="{{ site.author.name }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/site.css">
    <link rel="stylesheet" href="/assets/css/pygments.css">
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <h1 class="site-title"><a href="/">{{ site.title }}</a></h1>
        {% if site.author.bio %}<p class="site-bio">{{ site.author.bio }}</p>{% endif %}
      </header>
      <main>
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
    {% include analytics.html %}
  </body>
</html>
