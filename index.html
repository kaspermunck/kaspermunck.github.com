---
layout: layout
title: Kasper Munck
---

<ul id="posts">
  {% assign legacy = site.data.legacy_posts %}
  {% for post in site.posts %}
    <li class="post-listing">
      <a href="{{ post.url }}">{{ post.title }}</a>
      <time class="date">{{ post.date | date: "%b %d, %Y" }}</time>
    </li>
  {% endfor %}
  {% for post in legacy %}
    <li class="post-listing">
      <a href="{{ post.url }}">{{ post.title }}</a>
      <time class="date">{{ post.date | date: "%b %d, %Y" }}</time>
    </li>
  {% endfor %}
</ul>
